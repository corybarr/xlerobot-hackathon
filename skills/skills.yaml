# Discrete skills for the Set-the-Table track.
# Each entry is one trained per-skill VLA — Gemma chooses among them.
#
# Consumed by:
#   voice/tools.py                -> per-skill tool (pick_cup, pick_bowl, etc.)
#                                    each spawns lerobot-record with policy.path = vla.uri
#   scripts/record_skill.sh       -> task description + episode time for lerobot-record
#   orchestrator/orchestrator.py  -> available-actions list given to Gemma + per-skill VLA invocation
#
# vla.backend selects how the policy is invoked at runtime:
#   - "act"      : ACT (Action-Chunking Transformer)
#   - "smolvla"  : a vanilla lerobot SmolVLA checkpoint on HF Hub
#   - "kiteml"   : checkpoint trained on KiteML
#   - "molmoact2": MolmoAct2 runner (separate)
# vla.uri is the path/repo for that backend.
#
# IMPORTANT (per Mattie 2026-05-10): the MakerMods lerobot fork is on 0.3.4.
# The act_pick_cup_v3 local checkpoint on the thumb drive (and copied to
# ~/xlerobot-models/ on Spark for backup) was trained on upstream 0.5.1+
# and DOES NOT LOAD in 0.3.4 — only Mattie's HF ACT repos work in the GUI
# and are the verified-working defaults referenced here.

pick_cup:
  description: "Pick up the cup from the table (e.g. lift a cup out of a bowl)"
  episode_time_s: 15
  preconditions: "Cup is on the table within reach, gripper is open"
  postconditions: "Cup is held in gripper, lifted clear of the table surface"
  vla:
    backend: act
    uri: Mattie-NT/act_pick_cup_v3
    notes: Mattie's fresh cup ACT — replaces the disabled v1 SmolVLA (dataset was mislabeled bowls). Verified working in MakerMods GUI.

pick_cutlery:
  description: "Pick up a piece of cutlery (fork, knife, or spoon) from the table"
  episode_time_s: 15
  preconditions: "Cutlery is on the table within reach, gripper is open"
  postconditions: "Cutlery is held in gripper, lifted clear of the table surface"
  vla:
    backend: act
    uri: Mattie-NT/act_pick_cutlery
    notes: Mattie's ACT cutlery — verified working in MakerMods GUI on the 0.3.4 fork.

pick_bowl:
  description: "Pick up the bowl from the table"
  episode_time_s: 15
  preconditions: "Bowl is on the table within reach, gripper is open"
  postconditions: "Bowl is held in gripper, lifted clear of the table surface"
  vla:
    backend: act
    uri: Mattie-NT/act_pick_bowl
    notes: Mattie's ACT bowl — verified working in MakerMods GUI on the 0.3.4 fork.

pick_anything:
  description: "General pick — try this when the object doesn't clearly match cup, cutlery, or bowl, or when the per-skill VLA failed and you want a broader fallback"
  episode_time_s: 15
  preconditions: "An object is on the table within reach, gripper is open"
  postconditions: "Object is held in gripper, lifted clear of the table"
  vla:
    backend: smolvla
    uri: Mattie-NT/smolvla_mattie_3cam_ft
    notes: Mattie's 3-camera SmolVLA fine-tune; matches the hand_cam/front_cam/side_cam rig exactly. Trained on a multi-task superset rather than a single skill. Use as fallback or A/B against per-skill ones.
