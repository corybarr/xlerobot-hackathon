# Discrete skills for the Set-the-Table track.
# Each entry is one trained per-skill VLA — Gemma chooses among them.
#
# Consumed by:
#   scripts/record_skill.sh       -> task description + episode time for lerobot-record
#   orchestrator/orchestrator.py  -> available-actions list given to Gemma + per-skill VLA invocation
#
# vla.backend selects how the policy is invoked at runtime:
#   - "kiteml"   : checkpoint trained on KiteML, downloaded to local path or invoked via their API
#   - "smolvla"  : a vanilla lerobot SmolVLA checkpoint on HF Hub
#   - "act"      : ACT
#   - "molmoact2": MolmoAct2 runner (separate)
# vla.uri is the path/repo for that backend.

pick_cup:
  description: "Pick up the cup from the table"
  episode_time_s: 15
  preconditions: "Cup is on the table within reach, gripper is open"
  postconditions: "Cup is held in gripper, lifted clear of the table surface"
  vla:
    backend: smolvla
    uri: Globalmysterysnailrevolution/xlerobot-pick-cup-smolvla
    dataset_uri: Globalmysterysnailrevolution/xlerobot-pick-cup-20ep
    notes: trained on Spark (GB10) with lerobot-train, 5000 steps, batch=4, full fine-tune. KiteML attempted first but their training container hits a torchcodec bug.

pick_cutlery:
  description: "Pick up a piece of cutlery (fork, knife, or spoon) from the table"
  episode_time_s: 15
  preconditions: "Cutlery is on the table within reach, gripper is open"
  postconditions: "Cutlery is held in gripper, lifted clear of the table surface"
  vla:
    backend: smolvla
    uri: Globalmysterysnailrevolution/xlerobot-pick-cutlery-smolvla
    dataset_uri: Globalmysterysnailrevolution/xlerobot-pick-cutlery-20ep
    notes: trained on Spark, 5000 steps, batch=4, full fine-tune.

pick_bowl:
  description: "Pick up the bowl from the table"
  episode_time_s: 15
  preconditions: "Bowl is on the table within reach, gripper is open"
  postconditions: "Bowl is held in gripper, lifted clear of the table surface"
  vla:
    backend: kiteml
    uri: null   # filled in after KiteML job 1fff2259-1f0c-41ea-80b6-c42e3e80e9f0 completes
    job_id: 1fff2259-1f0c-41ea-80b6-c42e3e80e9f0
    dataset_uri: Globalmysterysnailrevolution/xlerobot-pick-bowl-20ep
