          <div class="rounded-xl border border-slate-200 p-4">
            <div class="flex items-center gap-2"><span class="text-xl">📸</span><span class="font-medium">QR code scan</span></div>
            <div class="text-slate-700 mt-1">Retail-style task. Hard part: perception + alignment in a structured environment. Easiest task to get a working demo on — pyzbar+cv2 already installed.</div>
          </div>

  <template id="tpl-workflow">
    <h1 class="text-2xl font-bold text-slate-900 tracking-tight">4. Workflow</h1>
    <div class="mt-6 space-y-3 text-sm leading-relaxed">
      <p class="text-slate-600">The loop you'll be running all weekend. When something breaks, drop back to the previous step — don't skip forward.</p>
      <ol class="space-y-3">
        <li class="rounded-xl border border-slate-200 p-4">
          <div class="flex items-center gap-2"><span class="pill bg-indigo-600 text-white">Step 1</span><span class="font-medium">Calibrate arms</span></div>
          <div class="text-slate-700 mt-1">Set dynamixel zero positions on leader and follower. Don't trust SO-ARM100 calibration — XLeRobot may differ.</div>
        </li>
        <li class="rounded-xl border border-slate-200 p-4">
          <div class="flex items-center gap-2"><span class="pill bg-indigo-600 text-white">Step 2</span><span class="font-medium">Teleop record</span></div>
          <div class="text-slate-700 mt-1">Leader arm puppeteers follower. Capture <span class="font-medium">5–20 episodes per task</span>. Record more than you think you need — diffusion is data-hungry.</div>
        </li>
        <li class="rounded-xl border border-slate-200 p-4">
          <div class="flex items-center gap-2"><span class="pill bg-indigo-600 text-white">Step 3</span><span class="font-medium">Visualize</span></div>
          <div class="text-slate-700 mt-1">Run <code class="bg-slate-100 px-1.5 py-0.5 rounded text-xs">lerobot-dataset-viz</code> (rerun.io). Drop bad episodes early — it's cheaper than letting them poison training.</div>
        </li>
        <li class="rounded-xl border border-slate-200 p-4">
          <div class="flex items-center gap-2"><span class="pill bg-indigo-600 text-white">Step 4</span><span class="font-medium">Train policy</span></div>
          <div class="text-slate-700 mt-1">Likely ACT or diffusion. Train on your dataset. Watch loss but don't optimize it as a goal — episode success matters.</div>
        </li>
        <li class="rounded-xl border border-slate-200 p-4">
          <div class="flex items-center gap-2"><span class="pill bg-indigo-600 text-white">Step 5</span><span class="font-medium">Eval closed-loop</span></div>
          <div class="text-slate-700 mt-1">Run the policy on the real arm. Watch what fails — that's your next dataset.</div>
        </li>
        <li class="rounded-xl border border-emerald-500 p-4 bg-emerald-50/40">
          <div class="flex items-center gap-2"><span class="pill bg-emerald-600 text-white">Step 6</span><span class="font-medium">Iterate</span></div>
          <div class="text-slate-700 mt-1">Bad episodes → re-record. Bad policy → more data or different hyperparams. Don't refactor; iterate.</div>
        </li>
      </ol>
    </div>
  </template>

  <script>
    const VALID = new Set(['home','mission','schedule','stack','workflow','setup','cli','troubleshooting','viz','strategy','people']);

    const content = document.getElementById('content');
    const sidebar = document.getElementById('sidebar');
    const mobileBtn = document.getElementById('mobileMenuBtn');
    const mainEl = document.querySelector('main');

    function setActive(id) {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-section') === id);
      });
    }

    function render(id, opts = {}) {
      if (!VALID.has(id)) id = 'home';
      const tpl = document.getElementById('tpl-' + id);
      if (!tpl) return;
      content.replaceChildren(tpl.content.cloneNode(true));
      setActive(id);
      window.scrollTo({ top: 0, behavior: opts.smooth ? 'smooth' : 'auto' });

      // Update hash without triggering hashchange (so we don't double-render)
      const newHash = '#' + id;
      if (window.location.hash !== newHash) {
        if (opts.replace) {
          history.replaceState(null, '', newHash);
        } else {
          history.pushState(null, '', newHash);
        }
      }

      // Close mobile drawer
      if (window.matchMedia('(max-width: 767px)').matches) {
        sidebar.classList.add('-translate-x-full');
        sidebar.classList.remove('translate-x-0');
      }
    }

    function sectionFromHash() {
      const h = (window.location.hash || '').replace(/^#/, '');
      return VALID.has(h) ? h : 'home';
    }

    // Initial render — replace state so back doesn't go to bare URL with no hash
    render(sectionFromHash(), { replace: true });

    // Sidebar + in-content nav buttons
    document.addEventListener('click', e => {
      const btn = e.target.closest('[data-section]');
      if (!btn) return;
      const id = btn.getAttribute('data-section');
      if (!VALID.has(id)) return;
      e.preventDefault();
      render(id);
    });

    // Browser back/forward
    window.addEventListener('popstate', () => {
      const id = sectionFromHash();
      const tpl = document.getElementById('tpl-' + id);
      if (!tpl) return;
      content.replaceChildren(tpl.content.cloneNode(true));
      setActive(id);
      window.scrollTo({ top: 0 });
    });

    // Mobile sidebar toggle
    if (mobileBtn) {
      mobileBtn.addEventListener('click', () => {
        if (sidebar.classList.contains('-translate-x-full')) {
          sidebar.classList.remove('-translate-x-full');
          sidebar.classList.add('translate-x-0');
        } else {
          sidebar.classList.add('-translate-x-full');
          sidebar.classList.remove('translate-x-0');
        }
      });
    }
  </script>
